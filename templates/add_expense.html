{% extends "base.html" %}
{% block title %}Add Expense — Spendly{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/add_expense.css') }}">
{% endblock %}

{% block content %}
<section class="add-expense-section">
    <div class="add-expense-container">

        <div class="add-expense-header">
            <h1 class="add-expense-title">Add Expense</h1>
            <p class="add-expense-subtitle">Record a new transaction to your account.</p>
        </div>

        <div class="add-expense-card">
            <form method="POST" action="{{ url_for('add_expense') }}" novalidate>

                <div class="form-row">
                    <div class="form-group">
                        <label for="amount">Amount (₹)</label>
                        <input
                            type="number"
                            id="amount"
                            name="amount"
                            class="form-input"
                            placeholder="0.00"
                            step="0.01"
                            min="0.01"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="date">Date</label>
                        <input
                            type="date"
                            id="date"
                            name="date"
                            class="form-input"
                            value="{{ today }}"
                            required
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" class="form-input" required>
                        {% for cat in categories %}
                            <option value="{{ cat }}">{{ cat }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="description">Description <span class="form-optional">(optional)</span></label>
                    <textarea
                        id="description"
                        name="description"
                        class="form-input form-textarea"
                        placeholder="What was this expense for?"
                        rows="3"
                    ></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-submit">Save Expense</button>
                    <a href="{{ url_for('profile') }}" class="btn-ghost">Cancel</a>
                </div>

            </form>
        </div>

    </div>
</section>
{% endblock %}
